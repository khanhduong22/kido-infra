server {
    listen 80;
    server_name _;

    # Route các request bắt đầu bằng /api/ vào backend (GitNexus Server)
    location /api/ {
        proxy_pass http://gitnexus-server:4747/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        # Đảm bảo tắt timeout nhanh cho các API chạy lâu (phân tích code)
        proxy_read_timeout 3600;
    }

    # Các request còn lại trỏ vào frontend (GitNexus Web)
    location / {
        proxy_pass http://gitnexus-web:4173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

        # Inject script to set backend URL to current origin when not localhost
        # GitNexus frontend reads from localStorage key 'gitnexus-backend-url'
        sub_filter '</head>' '<script>if(!location.hostname.match(/^(localhost|127\.)/)){localStorage.setItem("gitnexus-backend-url",location.origin)}</script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
