server {
    listen 80;
    server_name _;

    # Route các request bắt đầu bằng /api/ vào backend (GitNexus Server)
    location /api/ {
        proxy_pass http://gitnexus-server:4747/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        # Đảm bảo tắt timeout nhanh cho các API chạy lâu (phân tích code)
        proxy_read_timeout 3600;
    }

    # Redirect root to auto-connect to the hosted backend
    location = / {
        if ($arg_server = "") {
            if ($arg_project = "") {
                return 302 https://$host/?server=https://$host;
            }
        }
        proxy_pass http://gitnexus-web:4173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Các request còn lại trỏ vào frontend (GitNexus Web)
    location / {
        proxy_pass http://gitnexus-web:4173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
