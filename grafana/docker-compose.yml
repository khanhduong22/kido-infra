services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 9090:9090
    restart: unless-stopped
    networks:
      - default
      - ops_bridge

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - 9093:9093
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=KidoOps2026!
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - default
      - ops_bridge

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:learning_timescale_2026@timescaledb:5432/postgres?sslmode=disable"
    restart: unless-stopped
    networks:
      - default
      - ops_bridge

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    network_mode: "host"
    restart: unless-stopped

  # --- THÊM LOKI (LƯU LOG) VÀ PROMTAIL (THU GOM LOG) ---
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - default
      - ops_bridge

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - /root/.pm2/logs:/pm2logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - default
      - ops_bridge

  # --- CẶP ĐÔI SOI RAM/CPU TỪNG APP NHƯ AAPANEL ---
  telegraf:
    image: telegraf:alpine
    container_name: telegraf
    restart: unless-stopped
    user: "0:0"
    entrypoint: ["telegraf"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    ports:
      - "9273:9273"
    environment:
      - HOST_PROC=/host/proc
    networks:
      - default
      - ops_bridge

  process-exporter:
    image: ncabatoff/process-exporter:latest
    container_name: process-exporter
    restart: unless-stopped
    privileged: true
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - ./process-exporter.yml:/config/process-exporter.yml
    command:
      - '-procfs=/host/proc'
      - '-config.path=/config/process-exporter.yml'

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  default:
  ops_bridge:
    external: true
