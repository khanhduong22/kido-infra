version: '3.8'

services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    networks:
      - ops_bridge
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    ports:
      - "9000:9000"
    networks:
      - ops_bridge
    healthcheck:
      test: ["CMD-SHELL", "echo 'ok'"]
      interval: 60s
      timeout: 10s
      retries: 3

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3002:3001"
    networks:
      - ops_bridge
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 60s
      timeout: 10s
      retries: 3

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "81:81"
      - "80:80"
      - "443:443"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - ops_bridge

  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    ports:
      - "8086:80"
    networks:
      - ops_bridge

  signoz-telegram-proxy:
    image: node:20-alpine
    container_name: signoz-telegram-proxy
    ports:
      - "127.0.0.1:9200:9200"
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./signoz-telegram-proxy.js:/app/server.js:ro
    command: node server.js
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    networks:
      - ops_bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gkg:
    build:
      context: ../docker/gkg
    container_name: gkg
    restart: unless-stopped
    volumes:
      - /opt:/workspace:ro
    networks:
      - ops_bridge

networks:
  ops_bridge:
    external: true

volumes:
  portainer_data:
  uptime-kuma-data:
  npm_data:
  npm_letsencrypt:
